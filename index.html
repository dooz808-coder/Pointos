<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PointOS">
<link rel="manifest" href="manifest.json">
<title>PointOS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#f0ead6;font-family:monospace;min-height:100vh;padding-bottom:70px}
#flash{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#c8b8f0;color:#0d0d14;padding:6px 18px;border-radius:20px;font-weight:bold;font-size:12px;z-index:200;letter-spacing:1px;white-space:nowrap;display:none}
header{padding:16px 16px 10px;border-bottom:1px solid #1e1e2e;display:flex;justify-content:space-between;align-items:center}
.title{font-size:15px;letter-spacing:3px;text-transform:uppercase;color:#c8b8f0;font-weight:bold}
.badge{border:1px solid #c8b8f0;color:#c8b8f0;border-radius:6px;padding:3px 10px;font-size:12px}
nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a12;border-top:1px solid #1e1e2e;display:flex;justify-content:space-around;padding:8px 0 14px;z-index:50}
nav button{background:none;border:none;color:#444;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:monospace;padding:2px 8px}
nav button.active{color:#c8b8f0}
nav button span{font-size:16px}
.tab{display:none;padding:14px 16px}
.tab.active{display:block}
.sec{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;margin-top:6px}
.card{background:#13131f;border:1px solid #1e1e2e;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.row{display:flex;gap:8px;align-items:center}
.btn{background:#c8b8f0;color:#0d0d14;border:none;border-radius:8px;padding:8px 14px;font-size:11px;font-family:monospace;font-weight:bold;cursor:pointer}
.ghost{background:none;border:1px solid #333;color:#777;border-radius:8px;padding:7px 12px;font-size:11px;font-family:monospace;cursor:pointer}
.ghost.red{border-color:#f07070;color:#f07070}
input[type=text],input[type=number]{background:#1a1a2a;border:1px solid #2a2a3e;color:#f0ead6;border-radius:8px;padding:7px 10px;font-size:12px;font-family:monospace;outline:none}
input.full{width:100%}
.arc-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-top:3px;text-align:center}
.arc-sub{font-size:10px;color:#555;text-align:center;margin-top:1px}
</style>
</head>
<body>
<div id="flash"></div>
<header><div class="title">PointOS</div><div class="badge" id="total-badge">⚡ 0</div></header>

<div class="tab active" id="tab-home">
  <div style="display:flex;justify-content:space-around;align-items:flex-start;padding:16px 0;flex-wrap:wrap;gap:8px">
    <div><svg id="arc-sprint" width="120" height="120"></svg><div class="arc-label" style="color:#c8b8f0">Sprint</div><div class="arc-sub" id="sprint-sub">--</div></div>
    <div><svg id="arc-m1" width="100" height="100"></svg><div class="arc-label" style="color:#70c8f0">M1</div></div>
    <div><svg id="arc-m2" width="100" height="100"></svg><div class="arc-label" style="color:#f0c870">M2</div></div>
  </div>
  <div class="card" style="display:flex;justify-content:space-between;margin-bottom:14px">
    <div><div class="sec" style="margin:0 0 3px">Sprint resets in</div><div style="font-size:13px;color:#c8b8f0" id="timer-bar">--</div></div>
    <div style="text-align:right"><div class="sec" style="margin:0 0 3px">Milestone pts</div><div style="font-size:13px;color:#70c8f0" id="milestone-bar">0/560</div></div>
  </div>
  <div class="sec">Subtract points</div>
  <div class="row"><input type="number" style="width:80px" id="sub-input" placeholder="pts"><button class="ghost red" onclick="subtractPts()">− Subtract</button></div>
</div>

<div class="tab" id="tab-tasks">
  <div class="sec">Log a task</div>
  <div id="task-list"></div>
</div>

<div class="tab" id="tab-log">
  <div class="sec">Activity log</div>
  <div id="log-list"><div style="color:#444;font-size:12px">No activity yet.</div></div>
</div>

<div class="tab" id="tab-settings">
  <div class="sec">Timers & goals</div>
  <div style="margin-bottom:10px"><div class="sec" style="margin-bottom:4px">Sprint goal (pts)</div><input type="number" class="full" id="s-sg"></div>
  <div style="margin-bottom:10px"><div class="sec" style="margin-bottom:4px">Sprint duration (hrs)</div><input type="number" class="full" id="s-sh"></div>
  <div style="margin-bottom:10px"><div class="sec" style="margin-bottom:4px">Milestone 1 (pts)</div><input type="number" class="full" id="s-m1"></div>
  <div style="margin-bottom:10px"><div class="sec" style="margin-bottom:4px">Milestone 2 (pts)</div><input type="number" class="full" id="s-m2"></div>
  <div class="sec" style="margin-top:16px">Manage tasks</div>
  <div id="task-settings"></div>
  <div class="card" style="margin-top:12px">
    <div class="sec" style="margin-bottom:8px">Add new task</div>
    <div class="row" style="margin-bottom:8px">
      <input type="text" style="width:40px" id="nt-icon" placeholder="⭐">
      <input type="text" style="flex:1" id="nt-name" placeholder="Task name">
      <input type="number" style="width:52px" id="nt-pts" value="5">
    </div>
    <button class="btn" style="width:100%" onclick="addTask()">+ Add task</button>
  </div>
  <button class="btn" style="width:100%;margin-top:14px" onclick="saveSettings()">Save settings</button>
</div>

<nav>
  <button class="active" id="nav-home" onclick="showTab('home')"><span>◎</span>Home</button>
  <button id="nav-tasks" onclick="showTab('tasks')"><span>✦</span>Tasks</button>
  <button id="nav-log" onclick="showTab('log')"><span>≡</span>Log</button>
  <button id="nav-settings" onclick="showTab('settings')"><span>⚙</span>Settings</button>
</nav>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
const DEF={totalPoints:0,sprintPoints:0,sprintStart:Date.now(),milestoneBase:0,log:[],tasks:[{id:1,name:"Walk the Dog",points:5,icon:"🐕"},{id:2,name:"Workout",points:5,icon:"💪"},{id:3,name:"Study",points:5,icon:"📚"},{id:4,name:"Work",points:5,icon:"💼"},{id:5,name:"Chores",points:5,icon:"🧹"}],settings:{sprintGoal:70,sprintHours:99,milestone1:280,milestone2:560}};
let S=load();
function load(){try{const d=localStorage.getItem("pointos");return d?{...DEF,...JSON.parse(d)}:JSON.parse(JSON.stringify(DEF))}catch(e){return JSON.parse(JSON.stringify(DEF))}}
function save(){try{localStorage.setItem("pointos",JSON.stringify(S))}catch(e){}}
let ft;
function flash(m){const el=document.getElementById("flash");el.textContent=m;el.style.display="block";clearTimeout(ft);ft=setTimeout(()=>el.style.display="none",2200)}
function showTab(n){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));document.getElementById("tab-"+n).classList.add("active");document.getElementById("nav-"+n).classList.add("active");if(n==="settings")renderSettings()}
function drawArc(id,val,max,color){const svg=document.getElementById(id);const sz=parseInt(svg.getAttribute("width")),sw=9,r=(sz-sw)/2,c=2*Math.PI*r,p=Math.min(val/max,1),off=c*(1-p);svg.innerHTML=`<circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#1e1e2e" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 ${sz/2} ${sz/2})" style="transition:stroke-dashoffset 0.4s ease"/><text x="50%" y="44%" text-anchor="middle" dominant-baseline="middle" fill="#f0ead6" font-size="${sz*0.16}" font-family="monospace" font-weight="bold">${val}</text><text x="50%" y="64%" text-anchor="middle" dominant-baseline="middle" fill="#666" font-size="${sz*0.1}" font-family="monospace">/ ${max}</text>`}
function updateUI(){const mp=S.totalPoints-S.milestoneBase;document.getElementById("total-badge").textContent="⚡ "+S.totalPoints;document.getElementById("milestone-bar").textContent=mp+" / "+S.settings.milestone2;drawArc("arc-sprint",S.sprintPoints,S.settings.sprintGoal,"#c8b8f0");drawArc("arc-m1",Math.min(mp,S.settings.milestone1),S.settings.milestone1,"#70c8f0");drawArc("arc-m2",Math.min(mp,S.settings.milestone2),S.settings.milestone2,"#f0c870");renderTasks();renderLog()}
setInterval(()=>{const el=Date.now()-S.sprintStart,tot=S.settings.sprintHours*3600000,rem=tot-el;if(rem<=0){S.sprintPoints=0;S.sprintStart=Date.now();save();updateUI();document.getElementById("sprint-sub").textContent="Reset!";document.getElementById("timer-bar").textContent="Reset!"}else{const h=Math.floor(rem/3600000),m=Math.floor((rem%3600000)/60000),s=Math.floor((rem%60000)/1000),str=h+"h "+m+"m "+s+"s";document.getElementById("sprint-sub").textContent=str;document.getElementById("timer-bar").textContent=str}},1000);
function renderTasks(){const c=document.getElementById("task-list");c.innerHTML="";S.tasks.forEach(t=>{const d=document.createElement("div");d.className="card";d.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">${t.icon}</span><div><div style="font-size:13px">${t.name}</div><div style="color:#c8b8f0;font-size:11px;margin-top:2px">+${t.points} pts</div></div></div><button class="btn" onclick="logTask(${t.id})">+ Log</button></div><input type="text" class="full" style="margin-top:8px;font-size:11px" id="note-${t.id}" placeholder="Note (optional)...">`;c.appendChild(d)})}
function logTask(id){const t=S.tasks.find(x=>x.id===id);if(!t)return;const note=document.getElementById("note-"+id)?.value||"";S.totalPoints+=t.points;S.sprintPoints+=t.points;const mp=S.totalPoints-S.milestoneBase;if(mp>=S.settings.milestone2){S.milestoneBase=S.totalPoints;setTimeout(()=>flash("🏆 560 Complete! Milestones reset!"),100)}S.log.unshift({id:Date.now(),task:t.name,icon:t.icon,points:t.points,note,time:new Date().toLocaleString([],{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})});if(S.log.length>100)S.log.pop();save();updateUI();flash("+"+t.points+" — "+t.name);const n=document.getElementById("note-"+id);if(n)n.value=""}
function subtractPts(){const amt=parseInt(document.getElementById("sub-input").value);if(!amt||amt<=0)return;S.totalPoints=Math.max(0,S.totalPoints-amt);S.sprintPoints=Math.max(0,S.sprintPoints-amt);S.log.unshift({id:Date.now(),task:"Manual Deduction",icon:"➖",points:-amt,note:"",time:new Date().toLocaleString([],{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})});save();updateUI();flash("−"+amt+" pts");document.getElementById("sub-input").value=""}
function renderLog(){const c=document.getElementById("log-list");c.innerHTML="";if(!S.log.length){c.innerHTML='<div style="color:#444;font-size:12px">No activity yet.</div>';return}S.log.forEach(e=>{const d=document.createElement("div");d.className="card";d.style.borderColor=e.points>=0?"#1a3a1a":"#3a1a1a";d.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="display:flex;gap:8px;font-size:13px"><span>${e.icon}</span><span>${e.task}</span></div>${e.note?`<div style="font-size:10px;color:#666;margin-top:3px">${e.note}</div>`:""}<div style="font-size:10px;color:#444;margin-top:3px">${e.time}</div></div><div style="font-weight:bold;font-size:13px;color:${e.points>=0?"#5ac87a":"#e07070"}">${e.points>0?"+":""}${e.points}</div></div>`;c.appendChild(d)})}
function renderSettings(){document.getElementById("s-sg").value=S.settings.sprintGoal;document.getElementById("s-sh").value=S.settings.sprintHours;document.getElementById("s-m1").value=S.settings.milestone1;document.getElementById("s-m2").value=S.settings.milestone2;const c=document.getElementById("task-settings");c.innerHTML="";S.tasks.forEach(t=>{const d=document.createElement("div");d.className="card";d.style.padding="9px 12px";d.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center" id="tv-${t.id}"><span style="font-size:13px">${t.icon} ${t.name} <span style="color:#c8b8f0">(${t.points}pts)</span></span><button class="ghost" onclick="showEdit(${t.id})">Edit</button></div><div style="display:none;flex-direction:column;gap:8px" id="te-${t.id}"><div class="row"><input type="text" style="width:38px" id="ei-${t.id}" value="${t.icon}"><input type="text" style="flex:1" id="en-${t.id}" value="${t.name}"><input type="number" style="width:50px" id="ep-${t.id}" value="${t.points}"></div><div class="row"><button class="btn" onclick="saveEdit(${t.id})">Done</button><button class="ghost red" onclick="delTask(${t.id})">Delete</button></div></div>`;c.appendChild(d)})}
function showEdit(id){document.getElementById("tv-"+id).style.display="none";document.getElementById("te-"+id).style.display="flex"}
function saveEdit(id){const icon=document.getElementById("ei-"+id).value,name=document.getElementById("en-"+id).value,pts=parseInt(document.getElementById("ep-"+id).value)||0;S.tasks=S.tasks.map(t=>t.id===id?{...t,icon,name,points:pts}:t);save();renderSettings();updateUI()}
function delTask(id){S.tasks=S.tasks.filter(t=>t.id!==id);save();renderSettings();updateUI()}
function addTask(){const icon=document.getElementById("nt-icon").value||"⭐",name=document.getElementById("nt-name").value.trim(),pts=parseInt(document.getElementById("nt-pts").value)||5;if(!name)return;S.tasks.push({id:Date.now(),name,icon,points:pts});document.getElementById("nt-icon").value="";document.getElementById("nt-name").value="";document.getElementById("nt-pts").value="5";save();renderSettings();updateUI();flash("Task added!")}
function saveSettings(){S.settings.sprintGoal=parseInt(document.getElementById("s-sg").value)||70;S.settings.sprintHours=parseInt(document.getElementById("s-sh").value)||99;S.settings.milestone1=parseInt(document.getElementById("s-m1").value)||280;S.settings.milestone2=parseInt(document.getElementById("s-m2").value)||560;save();updateUI();flash("Settings saved.")}
updateUI();
</script>
</body>
</html>
